openapi: 3.0.0
info:
  title: Post API
  description: Post blog
  version: 1.0.0

servers:
  - url: http://localhost:8888
    description: Local

paths:
  /api/Posts:
    post:
      tags:
        - Posts
      summary: Create Posts.
      description: .
      operationId: post
      security:
        - bearerAuth: []
      requestBody:
        description: Created user object
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blog"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    get:
      summary: Get all Posts.
      tags:
        - Posts
      summary: Get posts.
      operationId: post
      requestBody:
        description: Created user object
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Blog"
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
  /api/Posts/{blogName}:
    get:
      summary: Get all Posts.
      tags:
        - Posts
      summary: Get posts.
      operationId: post
      parameters:
        - name: blogName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
  /api/Upload/Images:
    post:
      summary: Upload file
      description: Upload file (ảnh, tài liệu...) lên server. Yêu cầu Bearer token.
      tags:
        - Image
      requestBody:
        required: true
        content:
          multipart/form-data:   # 👈 quan trọng khi upload file
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File cần upload
      responses:
        "200":
          description: Upload thành công
          content:
            application/json:
              schema:
                type: object
                properties:
                  fileUrl:
                    type: string
                    example: https://cdn.example.com/uploads/avatar.png
        "400":
          description: Yêu cầu không hợp lệ
        "401":
          description: Thiếu hoặc sai Bearer token
  /api/Categories/{categoryName}:
    get:
      summary: Get categories.
      tags:
        - Categories
      summary: Get categories.
      operationId: categories
      parameters:
        - name: categoryName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: successful operation 
        "400":
          description: Unexpected error
components:
  schemas:
    Blog:
      type: object
      properties:
        title:
          type: string
          example: "title"
        content:
          type: string
          example: "content"
        description:
          type: string
          example: "description"
        image:
          type: string
          example: "image"
        categories:
          type: string
          example: "categories"
        user_id:
          type: number
          example: 1

    Error:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Invalid request"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
